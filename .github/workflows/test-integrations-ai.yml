# Do not edit this YAML file. This file is generated automatically by executing
# python scripts/split_tox_gh_actions/split_tox_gh_actions.py
# The template responsible for it is in
# scripts/split_tox_gh_actions/templates/base.jinja
name: Test AI
# Reusable workflow. It is invoked by the top-level `test.yml` orchestrator.
on:
  workflow_call:
permissions:
  contents: read
  actions: read
jobs:
  test-ai:
    name: AI
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8","3.9","3.10","3.11","3.12","3.13","3.14","3.14t"]
        os: [ubuntu-22.04]
    env:
      # 3.6/3.7 run in the python:X.Y container; tell uv to use that system Python.
      TOX_UV_PYTHON_PREFERENCE: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && 'only-system' || 'managed' }}
    container: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && format('python:{0}', matrix.python-version) || null }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: Mark workspace safe for git (3.6/3.7 container)
        # needed to make git rev-parse work in the containers
        # subprocesses (e.g. sentry_sdk.utils.get_git_revision) can run git.
        if: ${{ matrix.python-version == '3.6' || matrix.python-version == '3.7' }}
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Setup Test Env
        run: |
          uv sync
      - name: Test anthropic
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-anthropic"
      - name: Test cohere
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-cohere"
      - name: Test google_genai
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-google_genai"
      - name: Test huggingface_hub
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-huggingface_hub"
      - name: Test litellm
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-litellm"
      - name: Test openai-base
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-openai-base"
      - name: Test openai-notiktoken
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-openai-notiktoken"
      - name: Upload coverage data
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-ai-${{ matrix.python-version }}
          # .coverage-* / .junitxml-* are dotfiles, excluded by default
          include-hidden-files: true
          path: |
            .coverage-sentry-*
            .junitxml-*
          if-no-files-found: 'ignore'
          retention-days: 1
          overwrite: true
