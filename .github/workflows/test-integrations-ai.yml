# Do not edit this YAML file. This file is generated automatically by executing
# python scripts/split_tox_gh_actions/split_tox_gh_actions.py
# The template responsible for it is in
# scripts/split_tox_gh_actions/templates/base.jinja
name: Test AI
on:
  push:
    branches:
      - master
      - release/**
      - major/**
  pull_request:
# Cancel in progress workflows on pull_requests.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  actions: read
  pull-requests: write
  statuses: write
env:
  BUILD_CACHE_KEY: ${{ github.sha }}
  CACHED_BUILD_PATHS: |
    ${{ github.workspace }}/dist-serverless
jobs:
  test-ai:
    name: AI
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8","3.9","3.10","3.11","3.12","3.13","3.14","3.14t"]
        os: [ubuntu-22.04]
    env:
      # 3.6/3.7 run in the python:X.Y container; tell uv to use that system Python.
      UV_PYTHON_PREFERENCE: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && 'only-system' || 'managed' }}
    container: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && format('python:{0}', matrix.python-version) || null }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Debug git availability (3.6/3.7 container)
        if: ${{ matrix.python-version == '3.6' || matrix.python-version == '3.7' }}
        run: |
          echo "=== whoami / HOME ==="
          id
          echo "HOME=$HOME"
          echo "=== which git / git --version ==="
          which git || true
          git --version || true
          echo "=== ls -la repo dir ==="
          ls -la .
          echo "=== git config --list (global+system) ==="
          git config --list --show-origin || true
          echo "=== git rev-parse HEAD ==="
          git rev-parse HEAD && echo "OK" || echo "FAILED with exit=$?"
          echo "=== git status (short) ==="
          git status --porcelain || true
      - name: Setup Test Env
        # Pin tox + coverage to uv-managed Python 3.13 even when the job sets
        # UV_PYTHON_PREFERENCE=only-system for 3.6/3.7 (which only applies to tox-uv at test time).
        env:
          UV_PYTHON_PREFERENCE: managed
        run: |
          uv tool install --python 3.13 --with tox-uv tox
          uv tool install --python 3.13 "coverage[toml]"
      - name: Erase coverage
        run: |
          coverage erase
      - name: Test anthropic
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-anthropic"
      - name: Test cohere
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-cohere"
      - name: Test google_genai
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-google_genai"
      - name: Test huggingface_hub
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-huggingface_hub"
      - name: Test litellm
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-litellm"
      - name: Test openai-base
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-openai-base"
      - name: Test openai-notiktoken
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-openai-notiktoken"
      - name: Generate coverage XML
        if: ${{ !cancelled() }}
        run: |
          coverage combine .coverage-sentry-*
          coverage xml
      - name: Parse and Upload Coverage
        if: ${{ !cancelled() }}
        uses: getsentry/codecov-action@d90e69cdf071dfbb0430159125321dc09c424d4c # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: coverage.xml
          junit-xml-pattern: .junitxml
          base-branch: master
          verbose: true
  check_required_tests:
    name: All AI tests passed
    needs: test-ai
    # Always run this, even if a dependent job failed
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Check for failures
        if: needs.test-ai.result != 'success'
        run: |
          echo "One of the dependent jobs has failed. You may need to re-run it." && exit 1
