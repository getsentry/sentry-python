# Do not edit this YAML file. This file is generated automatically by executing
# python scripts/split_tox_gh_actions/split_tox_gh_actions.py
# The template responsible for it is in
# scripts/split_tox_gh_actions/templates/base.jinja
name: Test Web 2
# Reusable workflow. It is invoked by the top-level `test.yml` orchestrator.
on:
  workflow_call:
permissions:
  contents: read
  actions: read
jobs:
  test-web_2:
    name: Web 2
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.6","3.7","3.8","3.9","3.10","3.11","3.12","3.13","3.14","3.14t"]
        os: [ubuntu-22.04]
    env:
      # 3.6/3.7 run in the python:X.Y container; tell uv to use that system Python.
      TOX_UV_PYTHON_PREFERENCE: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && 'only-system' || 'managed' }}
    container: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && format('python:{0}', matrix.python-version) || null }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: Mark workspace safe for git (3.6/3.7 container)
        # needed to make git rev-parse work in the containers
        # subprocesses (e.g. sentry_sdk.utils.get_git_revision) can run git.
        if: ${{ matrix.python-version == '3.6' || matrix.python-version == '3.7' }}
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Setup Test Env
        run: |
          uv sync
      - name: Test aiohttp
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-aiohttp"
      - name: Test asgi
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-asgi"
      - name: Test bottle
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-bottle"
      - name: Test falcon
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-falcon"
      - name: Test litestar
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-litestar"
      - name: Test pyramid
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-pyramid"
      - name: Test quart
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-quart"
      - name: Test sanic
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-sanic"
      - name: Test starlite
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-starlite"
      - name: Test tornado
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-tornado"
      - name: Upload coverage data
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-web_2-${{ matrix.python-version }}
          # .coverage-* / .junitxml-* are dotfiles, excluded by default
          include-hidden-files: true
          path: |
            .coverage-sentry-*
            .junitxml-*
          if-no-files-found: 'ignore'
          retention-days: 1
          overwrite: true
