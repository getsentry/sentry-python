# Do not edit this YAML file. This file is generated automatically by executing
# python scripts/split_tox_gh_actions/split_tox_gh_actions.py
# The template responsible for it is in
# scripts/split_tox_gh_actions/templates/base.jinja
name: Test DBs
# Reusable workflow. It is invoked by the top-level `test.yml` orchestrator.
on:
  workflow_call:
permissions:
  contents: read
  actions: read
jobs:
  test-dbs:
    name: DBs
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.6","3.7","3.8","3.9","3.10","3.11","3.12","3.13","3.14","3.14t"]
        os: [ubuntu-22.04]
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: sentry
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        # Maps tcp port 5432 on service container to the host
        ports:
          - 5432:5432
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: sentry
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    env:
      # 3.6/3.7 run in the python:X.Y container; tell uv to use that system Python.
      TOX_UV_PYTHON_PREFERENCE: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && 'only-system' || 'managed' }}
      SENTRY_PYTHON_TEST_POSTGRES_HOST: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && 'postgres' || 'localhost' }}
      SENTRY_PYTHON_TEST_POSTGRES_USER: postgres
      SENTRY_PYTHON_TEST_POSTGRES_PASSWORD: sentry
      SENTRY_PYTHON_TEST_MYSQL_USER: root
      SENTRY_PYTHON_TEST_MYSQL_PASSWORD: sentry
    container: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && format('python:{0}', matrix.python-version) || null }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: "Setup ClickHouse Server"
        uses: getsentry/action-clickhouse-in-ci@5dc8a6a50d689bd6051db0241f34849e5a36490b # v1.7
      - name: Mark workspace safe for git (3.6/3.7 container)
        # needed to make git rev-parse work in the containers
        # subprocesses (e.g. sentry_sdk.utils.get_git_revision) can run git.
        if: ${{ matrix.python-version == '3.6' || matrix.python-version == '3.7' }}
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Setup Test Env
        run: |
          uv sync
      - name: Test aiomysql
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-aiomysql"
      - name: Test asyncpg
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-asyncpg"
      - name: Test clickhouse_driver
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-clickhouse_driver"
      - name: Test pymongo
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-pymongo"
      - name: Test redis
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-redis"
      - name: Test redis_py_cluster_legacy
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-redis_py_cluster_legacy"
      - name: Test sqlalchemy
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-sqlalchemy"
      - name: Upload coverage data
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-dbs-${{ matrix.python-version }}
          # .coverage-* / .junitxml-* are dotfiles, excluded by default
          include-hidden-files: true
          path: |
            .coverage-sentry-*
            .junitxml-*
          if-no-files-found: 'ignore'
          retention-days: 1
          overwrite: true
