# Do not edit this YAML file. This file is generated automatically by executing
# python scripts/split_tox_gh_actions/split_tox_gh_actions.py
# The template responsible for it is in
# scripts/split_tox_gh_actions/templates/base.jinja
name: Test DBs
on:
  push:
    branches:
      - master
      - release/**
      - major/**
  pull_request:
# Cancel in progress workflows on pull_requests.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  actions: read
  pull-requests: write
  statuses: write
jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      has_code_changes: ${{ steps.changes.outputs.has_code_changes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        with:
          filters: |
            has_code_changes:
              - 'sentry_sdk/**'
              - 'tests/**'
              - 'scripts/**'
              - '**/*.py'
              - '**/*.cfg'
              - '**/*.toml'
              - '**/*.ini'
              - 'Makefile'
              - 'requirements*.txt'
              - '.github/workflows/**'
  test-dbs:
    needs: changes
    if: needs.changes.outputs.has_code_changes == 'true'
    name: DBs
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.6","3.7","3.8","3.9","3.10","3.11","3.12","3.13","3.14","3.14t"]
        os: [ubuntu-22.04]
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: sentry
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        # Maps tcp port 5432 on service container to the host
        ports:
          - 5432:5432
    env:
      # 3.6/3.7 run in the python:X.Y container; tell uv to use that system Python.
      TOX_UV_PYTHON_PREFERENCE: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && 'only-system' || 'managed' }}
      SENTRY_PYTHON_TEST_POSTGRES_HOST: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && 'postgres' || 'localhost' }}
      SENTRY_PYTHON_TEST_POSTGRES_USER: postgres
      SENTRY_PYTHON_TEST_POSTGRES_PASSWORD: sentry
    container: ${{ (matrix.python-version == '3.6' || matrix.python-version == '3.7') && format('python:{0}', matrix.python-version) || null }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          cache-suffix: ${{ github.workflow }}-${{ matrix.python-version }}
      - name: "Setup ClickHouse Server"
        uses: getsentry/action-clickhouse-in-ci@5dc8a6a50d689bd6051db0241f34849e5a36490b # v1.7
      - name: Mark workspace safe for git (3.6/3.7 container)
        # needed to make git rev-parse work in the containers
        # subprocesses (e.g. sentry_sdk.utils.get_git_revision) can run git.
        if: ${{ matrix.python-version == '3.6' || matrix.python-version == '3.7' }}
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Setup Test Env
        run: |
          uv sync
      - name: Erase coverage
        run: |
          uv run coverage erase
      - name: Test asyncpg
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-asyncpg"
      - name: Test clickhouse_driver
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-clickhouse_driver"
      - name: Test pymongo
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-pymongo"
      - name: Test redis
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-redis"
      - name: Test redis_py_cluster_legacy
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-redis_py_cluster_legacy"
      - name: Test sqlalchemy
        run: |
          set -x # print commands that are executed
          ./scripts/runtox.sh "py${{ matrix.python-version }}-sqlalchemy"
      - name: Generate coverage XML
        if: ${{ !cancelled() }}
        run: |
          uv run coverage combine .coverage-sentry-*
          uv run coverage xml
      - name: Parse and Upload Coverage
        if: ${{ !cancelled() }}
        uses: getsentry/codecov-action@d90e69cdf071dfbb0430159125321dc09c424d4c # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: coverage.xml
          junit-xml-pattern: .junitxml
          base-branch: master
          verbose: true
  check_required_tests:
    name: All DBs tests passed
    needs: [changes, test-dbs]
    # Always run this, even if a dependent job failed
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Check for failures
        if: |
          needs.changes.result == 'failure' || needs.changes.result == 'cancelled' ||
          needs.test-dbs.result == 'failure' || needs.test-dbs.result == 'cancelled'
        run: |
          echo "One of the dependent jobs has failed. You may need to re-run it." && exit 1
