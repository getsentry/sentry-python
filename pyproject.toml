#
# Project dev dependencies (PEP 735 groups).
# `dev` is installed by default; `typing` is opt-in via `uv run --group typing`.
# Run tox with: `uv run tox -e <env>`
# Run mypy with: `uv run --group typing mypy sentry_sdk`
#

[dependency-groups]
dev = [
    "tox",
    "tox-uv",
    "coverage[toml]",
    "pre-commit",
    "ruff",
]

toxgen = [
    "jinja2",
    "packaging<26.0",
    "pip",
    "requests",
]

docs = [
    "gevent",
    "shibuya",
    "sphinx<8.2",
    "sphinx-autodoc-typehints[type_comments]>=2.3.0",
    "typing-extensions",
]

aws = [
    "certifi",
    "urllib3",
    # In Lambda functions botocore is used, and botocore has
    # restrictions on urllib3
    # https://github.com/boto/botocore/blob/develop/setup.cfg
    # So we pin this here to make our Lambda layer work with
    # Lambda Function using Python 3.7+
    "urllib3<1.27; python_version < '3.10'",
]

typing = [
    "mypy",
    # =================
    # TODO: remove redundant urllib3 and certifi after proper migration from setup.py
    "urllib3>=1.26.11",
    "certifi",
    # =================
    "types-protobuf",
    "types-gevent",
    "types-greenlet",
    "types-redis",
    "types-setuptools<71",
    "types-webob",
    "opentelemetry-distro[otlp]",
    "pymongo",
    "loguru",
    "httpcore[asyncio,http2]",
    "launchdarkly-server-sdk",
    "openfeature-sdk",
    "statsig",
    "UnleashClient<6",
    "typer",
    "strawberry-graphql",
    "httpx",
    "httpx2",
    "botocore-stubs",
    "werkzeug",
]

#
# Tool: Coverage
#

[tool.coverage.run]
branch = true
core = "ctrace"
omit = [
    "/tmp/*",
    "*/tests/*",
    "*/.venv/*",
]

[tool.coverage.report]
exclude_also = [
    "if TYPE_CHECKING:",
]

#
# Tool: Pytest
#

[tool.pytest.ini_options]
addopts = "-vvv -rfEs -s --durations=5 --cov=./sentry_sdk --cov-branch --cov-report= --tb=short --junitxml=.junitxml"
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "tests_internal_exceptions: Handle internal exceptions just as the SDK does, to test it. (Otherwise internal exceptions are recorded and reraised.)",
]

[tool.pytest-watch]
verbose = true
nobeep = true

#
# Tool: Mypy
#

[tool.mypy]
allow_redefinition = true
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
no_implicit_optional = true
python_version = "3.11"
strict_equality = true
strict_optional = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

# Relaxations for code written before mypy was introduced
# Do not use wildcards in module paths, otherwise added modules will
# automatically have the same set of relaxed rules as the rest
[[tool.mypy.overrides]]
module = "cohere.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "django.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pyramid.*"
