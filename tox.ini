; SDK is installed via deps below to resolve all deps at once (tox-uv limitation)
package = skip
dependency_groups = test
deps =
    # === Common ===
    py3.8-common: hypothesis
    common: brotli
    common: executing
    common: httpcore[asyncio,http2]
    common: jsonschema
    common: pysocks
    common: pytest-asyncio
    common: pytest-forked
    common: pytest-timeout
    common: pytest_localserver
    common: socksio
    common: werkzeug
    # See https://github.com/pytest-dev/pytest/issues/9621
