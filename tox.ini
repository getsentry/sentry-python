    ; Install the SDK in deps so uv resolves runtime deps together with
    ; everything above in a single pass.
    ; uv only supports PEP 660 editables; py3.6's max setuptools (~59) predates
    ; PEP 660, so fall back to a non-editable install there.
    !py3.6: -e .
    py3.6: .

setenv =
    PYTHONDONTWRITEBYTECODE=1
    OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES
    COVERAGE_FILE=.coverage-sentry-{envname}
    UV_CACHE_DIR={env:HOME}/.cache/uv/{envname}

    UV_PRERELEASE=if-necessary-or-explicit
    mcp-v2.0.0a1: UV_PRERELEASE=allow
    pydantic_ai-v2.0.0b7: UV_PRERELEASE=allow
    sqlalchemy-v2.1.0b2: UV_PRERELEASE=allow
    ariadne-v1.1.0a3: UV_PRERELEASE=allow
    gql-v4.3.0b3: UV_PRERELEASE=allow
    django-v6.1a1: UV_PRERELEASE=allow
    falcon-v4.3.0rc1: UV_PRERELEASE=allow

    py3.6: COVERAGE_RCFILE=.coveragerc36

    django: DJANGO_SETTINGS_MODULE=tests.integrations.django.myapp.settings
    spark-v{3.0.3,3.5.6}: JAVA_HOME=/usr/lib/jvm/temurin-11-jdk-amd64

    # Ray 2.43+ auto-detects `uv run` drivers and spawns workers via uv,
    # which targets the workspace `.venv` instead of the tox env and hangs.
    ray: RAY_ENABLE_UV_RUN_RUNTIME_ENV=0

    # Avoid polluting test suite with imports
    common: PYTEST_ADDOPTS="--ignore=tests/test_shadowed_module.py"
    gevent: PYTEST_ADDOPTS="--ignore=tests/test_shadowed_module.py"

    # TESTPATH definitions for test suites not managed by toxgen
    common: _TESTPATH=tests
